# =============================================================================
# GitHub Actions CI/CD Workflow — Lambda Native TypeScript
# Handles: CI (build + test) → Infra (ACM cert stack → app stack) → Deploy (zip → lambda update-function-code)
#
# Use this for Lambda functions with a native AWS handler (e.g. APIGatewayProxyHandlerV2,
# streaming handlers using awslambda.streamifyResponse, MCP/agentic AI lambdas).
#
# How to use:
#   1. Copy templates/cf-ui-acm.yml  → infra/cert-stack.yml  in the app repo
#   2. Copy templates/cf-lambda.yml  → infra/app-stack.yml   in the app repo
#   3. Copy this file                → .github/workflows/deploy.yml  in the app repo
#   4. Add the required GitHub Secrets (see README for full list)
#
# Handler convention: dist/index.handler (tsc output of src/index.ts)
# Invoke mode: set GitHub secret INVOKE_MODE to BUFFERED or RESPONSE_STREAM (default RESPONSE_STREAM)
# =============================================================================

name: CI/CD Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]       # fires only on merged PRs
  workflow_dispatch:      # allows manual trigger from the GitHub Actions UI

# Prevent concurrent deploys on the same ref
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  STACK_NAME: ${{ secrets.APP_NAME }}-stack
  CERT_STACK_NAME: ${{ secrets.APP_NAME }}-cert-stack
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}

jobs:
  # ============================================
  # CI: Build, Test, and Package
  # ============================================
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Prune dev dependencies
        # Remove devDependencies before packaging so the zip stays small.
        # node_modules is reinstalled cleanly from the lockfile — only prod deps remain.
        run: npm prune --production

      - name: Package Lambda artifact
        # Zip dist/ (compiled JS), node_modules/ (prod-only), and package.json.
        # The handler path in cf-lambda.yml (dist/index.handler) must match the tsc outDir.
        run: zip -r package.zip dist/ node_modules/ package.json

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: package.zip
          retention-days: 1

  # ============================================
  # Infra: Create/Update CloudFormation Stacks
  # Step 1 — cert stack in us-east-1 (idempotent)
  # Step 2 — app stack in target region (idempotent)
  # ============================================
  infra:
    name: Provision Infrastructure
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      function_name:       ${{ steps.stack-outputs.outputs.function_name }}
      distribution_id:     ${{ steps.stack-outputs.outputs.distribution_id }}
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ACM certificate stack (us-east-1)
        run: |
          aws cloudformation deploy \
            --stack-name "$CERT_STACK_NAME" \
            --template-file infra/cert-stack.yml \
            --region us-east-1 \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DomainName="${{ secrets.DOMAIN_NAME }}" \
              HostedZoneId="${{ secrets.HOSTED_ZONE_ID }}"

      - name: Get certificate ARN
        id: cert-outputs
        run: |
          CERT_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$CERT_STACK_NAME" \
            --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='CertificateArn'].OutputValue" \
            --output text)
          if [[ -z "$CERT_ARN" || "$CERT_ARN" == "None" ]]; then
            echo "ERROR: CertificateArn output is empty — cert stack may not be in a healthy state"
            exit 1
          fi
          echo "Certificate ARN: $CERT_ARN"
          echo "certificate_arn=$CERT_ARN" >> $GITHUB_OUTPUT

      - name: Deploy app stack
        # Idempotent: creates on first run, updates only if template/params changed,
        # exits cleanly when nothing has changed.
        # AppEnvJson is passed via env var to safely handle JSON strings and special
        # characters without shell escaping issues.
        env:
          APP_ENV_JSON: ${{ secrets.APP_ENV_JSON }}
        run: |
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file infra/app-stack.yml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              AppName="${{ secrets.APP_NAME }}" \
              Environment="prod" \
              Handler="dist/index.handler" \
              InvokeMode="${{ secrets.INVOKE_MODE || 'RESPONSE_STREAM' }}" \
              MemorySize="${{ secrets.MEMORY_SIZE || '512' }}" \
              Timeout="${{ secrets.TIMEOUT || '900' }}" \
              DomainName="${{ secrets.DOMAIN_NAME }}" \
              AcmCertificateArn="${{ steps.cert-outputs.outputs.certificate_arn }}" \
              HostedZoneId="${{ secrets.HOSTED_ZONE_ID }}" \
              "AppEnvJson=$APP_ENV_JSON"

      - name: Get stack outputs
        id: stack-outputs
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionName'].OutputValue" \
            --output text)

          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)

          if [[ -z "$FUNCTION_NAME" || "$FUNCTION_NAME" == "None" ]]; then
            echo "ERROR: FunctionName output is empty — app stack may not be in a healthy state"
            exit 1
          fi
          if [[ -z "$DIST_ID" || "$DIST_ID" == "None" ]]; then
            echo "ERROR: CloudFrontDistributionId output is empty — app stack may not be in a healthy state"
            exit 1
          fi

          echo "Lambda function: $FUNCTION_NAME"
          echo "CloudFront distribution: $DIST_ID"
          echo "function_name=$FUNCTION_NAME"   >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST_ID"       >> $GITHUB_OUTPUT

  # ============================================
  # Deploy: Push code zip → Lambda + Invalidate CloudFront
  # ============================================
  deploy:
    name: Deploy Lambda Code
    needs: infra
    runs-on: ubuntu-latest

    steps:
      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get stack outputs
        id: stack-outputs
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionName'].OutputValue" \
            --output text)

          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)

          if [[ -z "$FUNCTION_NAME" || "$FUNCTION_NAME" == "None" ]]; then
            echo "ERROR: FunctionName output is empty — app stack may not be in a healthy state"
            exit 1
          fi
          if [[ -z "$DIST_ID" || "$DIST_ID" == "None" ]]; then
            echo "ERROR: CloudFrontDistributionId output is empty — app stack may not be in a healthy state"
            exit 1
          fi

          echo "Lambda function: $FUNCTION_NAME"
          echo "CloudFront distribution: $DIST_ID"
          echo "function_name=$FUNCTION_NAME"   >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST_ID"       >> $GITHUB_OUTPUT

      - name: Update Lambda function code
        run: |
          FUNCTION_NAME="${{ steps.stack-outputs.outputs.function_name }}"

          echo "Deploying code to Lambda: $FUNCTION_NAME"
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://package.zip \
            --query "FunctionArn" \
            --output text

      - name: Wait for Lambda update to complete
        run: |
          FUNCTION_NAME="${{ steps.stack-outputs.outputs.function_name }}"
          echo "Waiting for Lambda update to complete..."
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME"
          echo "Lambda update complete."

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ steps.stack-outputs.outputs.distribution_id }}"
          echo "Invalidating CloudFront distribution: $DIST_ID"
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
