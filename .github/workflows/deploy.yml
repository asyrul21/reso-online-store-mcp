name: Deploy MCP Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    # Use GitHub environment matching the target (for environment-scoped secrets)
    environment: ${{ github.event_name == 'push' && 'prod' || github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          ENV=${{ github.event_name == 'push' && 'prod' || github.event.inputs.environment }}
          sam deploy \
            --config-env "$ENV" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Print deployed CloudFront URL
        run: |
          ENV=${{ github.event_name == 'push' && 'prod' || github.event.inputs.environment }}
          STACK_NAME="reso-online-store-mcp-${ENV}"
          echo "Deployed stack: $STACK_NAME"
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='McpCloudFrontUrl'].OutputValue" \
            --output text
