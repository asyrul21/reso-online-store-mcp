# CloudFormation template for ACM certificate provisioning.
# MUST be deployed in us-east-1 — CloudFront only accepts certificates from us-east-1.
# copy this to infra/cert-stack.yml in the app repo
#
# Deploy this stack BEFORE the app stack (cf-ui-s3.yml or cf-s3-static.yml).
# The app stack receives the CertificateArn output from this stack via the CI/CD workflow.
AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ACM certificate for CloudFront — must be deployed in us-east-1.
  DNS-validated automatically via Route53 HostedZoneId.
  Deploy this stack once per app; the CertificateArn output is passed to the app stack.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  DomainName:
    Type: String
    Description: "Root custom domain (e.g. mydomain.com or myapp.mydomain.com). Must NOT start with 'www.' — the www subdomain is derived automatically."
    AllowedPattern: "^(?!www\\.).*$"
    ConstraintDescription: "Must not start with 'www.' — the www variant is created automatically as a SAN."

  HostedZoneId:
    Type: String
    Description: "Route53 Hosted Zone ID. Required — used for automated DNS validation of the certificate."

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ------------------------------------------------------------
  # ACM Certificate
  # Always DNS-validated via the provided HostedZoneId.
  # This resource MUST live in us-east-1 for CloudFront to accept it.
  # The www subdomain is always included as a Subject Alternative Name.
  # ------------------------------------------------------------
  AcmCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub "www.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
        - DomainName: !Sub "www.${DomainName}"
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Name
          Value: !Ref DomainName

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  CertificateArn:
    Description: "ARN of the ACM certificate — pass this to the app stack as AcmCertificateArn"
    Value: !Ref AcmCertificate
