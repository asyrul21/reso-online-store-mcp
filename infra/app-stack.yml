# CloudFormation template for Lambda deployments (native handler or Express-on-Lambda).
# copy this to infra/app-stack.yml in the app repo
#
# ACM certificate is provisioned directly in this stack (same region as the API Gateway).
# No separate cert stack is needed — unlike CloudFront stacks which require us-east-1.
#
# Traffic: Route 53 → API Gateway (Regional) → Lambda
# API Gateway handles TLS, custom domain, multi-endpoint routing, and auth.
# AuthType controls whether methods require SigV4 signing (AWS_IAM) or are public (NONE).
# When AWS_IAM: clients sign requests with SigV4 against execute-api service.
#              Works natively with Postman (AWS Signature auth) and Console Test button.
# When NONE:   API is publicly accessible — handler is responsible for any auth.
AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Lambda + API Gateway REST API stack. Deploys a Lambda function fronted by a Regional
  API Gateway REST API with proxy integration. Supports response streaming (RESPONSE_STREAM)
  and custom domain via Route 53. AuthType is parameterised: NONE (public) or AWS_IAM (SigV4).
  ACM certificate is provisioned in the same region as this stack (no separate cert stack needed).

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  AppName:
    Type: String
    Description: "App identifier (lowercase, hyphens ok). Used for all resource naming."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - prod
    Description: "Deployment environment."

  Runtime:
    Type: String
    Default: nodejs20.x
    AllowedValues:
      - nodejs18.x
      - nodejs20.x
      - nodejs22.x
    Description: "Lambda runtime."

  Handler:
    Type: String
    Default: dist/index.handler
    Description: "Lambda handler entry point (e.g. dist/index.handler or dist/lambda.handler)."

  MemorySize:
    Type: Number
    Default: 512
    MinValue: 128
    MaxValue: 10240
    Description: "Lambda memory in MB."

  Timeout:
    Type: Number
    Default: 900
    MinValue: 1
    MaxValue: 900
    Description: "Lambda timeout in seconds. Note: API Gateway REST has a max integration timeout of 29s."

  InvokeMode:
    Type: String
    Default: BUFFERED
    AllowedValues:
      - BUFFERED
      - RESPONSE_STREAM
    Description: >
      Lambda invocation mode.
      Use RESPONSE_STREAM for streaming responses (e.g. agentic AI, SSE, LLM token streaming).
      Use BUFFERED for standard request/response (e.g. REST APIs).
      When RESPONSE_STREAM: integration URI targets /response-streaming-invocations and
      ResponseTransferMode: STREAM is set on the method integration.

  AppEnvJson:
    Type: String
    NoEcho: true
    Default: "{}"
    Description: >
      App environment variables as a JSON string, e.g.
      {"NODE_ENV":"production","API_URL":"https://api.example.com","JWT_SECRET":"xxx"}.
      Set as the APP_CONFIG environment variable on the Lambda function.
      Parse in your handler: const config = JSON.parse(process.env.APP_CONFIG || '{}')

  DomainName:
    Type: String
    Default: ""
    Description: "Custom domain (e.g. api.mydomain.com). Leave empty to use the API Gateway default execute-api URL."

  HostedZoneId:
    Type: String
    Default: ""
    Description: "Route53 Hosted Zone ID. Required if DomainName is set — used for DNS cert validation and the Route53 alias record."

  AuthType:
    Type: String
    Default: NONE
    AllowedValues:
      - NONE
      - AWS_IAM
    Description: >
      API Gateway method-level authorization.
      NONE = publicly accessible (no signing required) — use this for browser-facing APIs;
             enforce auth inside the Lambda handler (e.g. JWT validation).
      AWS_IAM = requires SigV4 signing against the execute-api service — use this for
                service-to-service calls from other AWS principals (EC2, Lambda, etc.).
                Set via GitHub variable AWS_AUTH (true = AWS_IAM, false/omitted = NONE).

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]
  IsStreaming:     !Equals [!Ref InvokeMode, "RESPONSE_STREAM"]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # --------------------------------------------------
  # CloudWatch Log Group
  # Pre-created so retention is managed by CloudFormation.
  # Named /aws/lambda/{AppName}-prod to stay under the /aws/lambda/ prefix
  # (covered by the deployer's existing CloudWatchLogsForLambda permission)
  # while using the -prod suffix consistent with EC2's /apps/{AppName}-prod.
  # --------------------------------------------------
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-prod"
      RetentionInDays: 30
      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # IAM Execution Role
  # Allows Lambda to write logs to the pre-created log group.
  # Extend this role's inline policies for additional AWS access
  # (e.g. SSM Parameter Store, S3, SES, DynamoDB).
  # --------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AppName}-prod*"

  # --------------------------------------------------
  # Lambda Function
  # Deployed with an inline ZipFile placeholder on first CFN run.
  # All subsequent code updates are pushed by the CI/CD deploy job via:
  #   aws lambda update-function-code --function-name <name> --zip-file fileb://package.zip
  # CFN never touches the code after creation, so stack updates are safe.
  # --------------------------------------------------
  LambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaLogGroup
    Properties:
      FunctionName: !Sub "${AppName}-lambda"
      Runtime: !Ref Runtime
      Handler: !Ref Handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: !Ref MemorySize
      Timeout: !Ref Timeout
      Architectures:
        - x86_64
      LoggingConfig:
        LogGroup: !Sub "/aws/lambda/${AppName}-prod"
        LogFormat: Text
      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          APP_CONFIG: !Ref AppEnvJson
      Code:
        ZipFile: |
          exports.handler = async (event) => ({
            statusCode: 200,
            body: JSON.stringify({ status: 'placeholder — deploy real code via CI/CD' }),
          });
      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # API Gateway REST API
  # Regional endpoint — NEVER use EDGE here.
  # Edge-optimized silently creates a CloudFront distribution and reintroduces
  # the Host-header rewrite issues this architecture is designed to avoid.
  # DisableExecuteApiEndpoint: false keeps the default execute-api URL active
  # so Postman and Console testing work before a custom domain is configured.
  # --------------------------------------------------
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AppName}-api"
      Description: !Sub "API Gateway REST API for ${AppName} Lambda"
      EndpointConfiguration:
        Types:
          - REGIONAL
      DisableExecuteApiEndpoint: false
      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # Proxy Resource — /{proxy+}
  # Catches all paths and forwards them to the Lambda.
  # The Lambda handler is responsible for routing by event.path / event.httpMethod.
  # --------------------------------------------------
  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: "{proxy+}"

  # --------------------------------------------------
  # Proxy Method — ANY /{proxy+}
  # AWS_PROXY integration forwards the full request to Lambda and returns Lambda's
  # response verbatim. ResponseTransferMode: STREAM activates response streaming
  # (requires InvokeMode=RESPONSE_STREAM and awslambda.streamifyResponse in handler).
  # Integration URI selects /response-streaming-invocations vs /invocations based on InvokeMode.
  # TimeoutInMillis: 29000 — API Gateway REST hard max (29 s). For long-running workloads
  # beyond 29 s, use InvokeMode=RESPONSE_STREAM so the first byte resets the timeout clock.
  # --------------------------------------------------
  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ProxyResource
      HttpMethod: ANY
      AuthorizationType: !Ref AuthType
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        TimeoutInMillis: 29000
        ContentHandling: CONVERT_TO_TEXT
        Uri: !If
          - IsStreaming
          - !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2021-11-15/functions/${LambdaFunction.Arn}/response-streaming-invocations"
          - !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations"

  # --------------------------------------------------
  # Root Method — ANY /
  # Handles requests to the bare domain (e.g. GET / → handler).
  # --------------------------------------------------
  RootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !GetAtt RestApi.RootResourceId
      HttpMethod: ANY
      AuthorizationType: !Ref AuthType
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        TimeoutInMillis: 29000
        ContentHandling: CONVERT_TO_TEXT
        Uri: !If
          - IsStreaming
          - !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2021-11-15/functions/${LambdaFunction.Arn}/response-streaming-invocations"
          - !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations"

  # --------------------------------------------------
  # API Gateway Deployment + Stage
  # DependsOn both methods — CFN deploys resources concurrently and will create
  # the Deployment before methods exist unless this dependency is explicit.
  # Stage name "prod" is consistent with existing stack naming conventions.
  # --------------------------------------------------
  RestApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ProxyMethod
      - RootMethod
    Properties:
      RestApiId: !Ref RestApi

  RestApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref RestApiDeployment
      StageName: prod
      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # Lambda Permission — API Gateway invoke
  # Grants API Gateway permission to invoke the Lambda for any method/path on this API.
  # Required regardless of AuthType — API Gateway invokes Lambda under its own execution
  # context; the permission allows the service principal to call lambda:InvokeFunction.
  # --------------------------------------------------
  LambdaApiGwPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*/*"

  # --------------------------------------------------
  # ACM Certificate (conditional — only when DomainName is set)
  # Provisioned in the same region as this stack — valid for Regional API Gateway.
  # DNS-validated automatically via the provided HostedZoneId.
  # No separate cert stack needed (unlike CloudFront which requires us-east-1).
  # --------------------------------------------------
  AcmCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # API Gateway Custom Domain Name (conditional — only when DomainName is set)
  # RegionalCertificateArn references the cert provisioned above (same region).
  # EndpointConfiguration: REGIONAL — matches the REST API endpoint type.
  # --------------------------------------------------
  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      RegionalCertificateArn: !Ref AcmCertificate
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2
      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # Base Path Mapping
  # Maps the custom domain root to the prod stage.
  # Callers use https://api.yourdomain.com/health (no /prod prefix).
  # --------------------------------------------------
  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: HasCustomDomain
    DependsOn: RestApiStage
    Properties:
      DomainName: !Ref ApiCustomDomain
      RestApiId: !Ref RestApi
      Stage: prod

  # --------------------------------------------------
  # Route53 Alias Record (conditional — only when DomainName is set)
  # Points to the API Gateway Regional domain name + its hosted zone ID.
  # Unlike CloudFront (which always used Z2FDTNDATAQYW2), the regional hosted zone ID
  # is API-Gateway-specific and retrieved from the domain name resource.
  # --------------------------------------------------
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  FunctionName:
    Description: "Lambda function name — used by CI/CD deploy job to push code updates"
    Value: !Ref LambdaFunction
    Export:
      Name: !Sub "${AWS::StackName}-FunctionName"

  FunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FunctionArn"

  RestApiId:
    Description: "API Gateway REST API ID"
    Value: !Ref RestApi
    Export:
      Name: !Sub "${AWS::StackName}-RestApiId"

  ApiInvokeUrl:
    Description: "API Gateway default invoke URL (always available — use this for Postman and CLI testing)"
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: !Sub "${AWS::StackName}-ApiInvokeUrl"

  WebsiteUrl:
    Description: "Live HTTPS URL (custom domain if configured, otherwise API Gateway default)"
    Value: !If
      - HasCustomDomain
      - !Sub "https://${DomainName}"
      - !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: !Sub "${AWS::StackName}-WebsiteUrl"

  LogGroupName:
    Description: "CloudWatch Log Group name"
    Value: !Sub "/aws/lambda/${AppName}-prod"
    Export:
      Name: !Sub "${AWS::StackName}-LogGroupName"
