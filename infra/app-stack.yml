# CloudFormation template for Lambda deployments (native handler or Express-on-Lambda).
# copy this to infra/app-stack.yml in the app repo
#
# ACM certificate is managed separately in infra/cert-stack.yml (cf-ui-acm.yml).
# The CI/CD workflow deploys the cert stack in us-east-1 first, then passes the
# CertificateArn output to this stack as AcmCertificateArn.
#
# Traffic: CloudFront (public) → OAC (SigV4) → Lambda Function URL (AWS_IAM) → Lambda
# The Function URL always uses AWS_IAM auth — only CloudFront can invoke it via OAC.
# Direct Function URL access is blocked; all public traffic goes through CloudFront.
AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Lambda + CloudFront stack. Deploys a Lambda function fronted by CloudFront via
  a Lambda Function URL with AWS_IAM auth (OAC/SigV4).
  Supports both BUFFERED and RESPONSE_STREAM invoke modes.
  ACM certificate is provided via AcmCertificateArn (managed by cf-ui-acm.yml cert stack).

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  AppName:
    Type: String
    Description: "App identifier (lowercase, hyphens ok). Used for all resource naming."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - prod
    Description: "Deployment environment."

  Runtime:
    Type: String
    Default: nodejs20.x
    AllowedValues:
      - nodejs18.x
      - nodejs20.x
      - nodejs22.x
    Description: "Lambda runtime."

  Handler:
    Type: String
    Default: dist/index.handler
    Description: "Lambda handler entry point (e.g. dist/index.handler or dist/lambda.handler)."

  MemorySize:
    Type: Number
    Default: 512
    MinValue: 128
    MaxValue: 10240
    Description: "Lambda memory in MB."

  Timeout:
    Type: Number
    Default: 900
    MinValue: 1
    MaxValue: 900
    Description: "Lambda timeout in seconds."

  InvokeMode:
    Type: String
    Default: BUFFERED
    AllowedValues:
      - BUFFERED
      - RESPONSE_STREAM
    Description: >
      Lambda Function URL invoke mode.
      Use RESPONSE_STREAM for streaming responses (e.g. agentic AI, SSE).
      Use BUFFERED for standard request/response (e.g. REST APIs).

  AppEnvJson:
    Type: String
    NoEcho: true
    Default: "{}"
    Description: >
      App environment variables as a JSON string, e.g.
      {"NODE_ENV":"production","API_URL":"https://api.example.com","JWT_SECRET":"xxx"}.
      Set as the APP_CONFIG environment variable on the Lambda function.
      Parse in your handler: const config = JSON.parse(process.env.APP_CONFIG || '{}')

  DomainName:
    Type: String
    Default: ""
    Description: "Custom domain (e.g. api.mydomain.com). Leave empty to use the CloudFront default *.cloudfront.net domain."

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: "ARN of the ACM certificate in us-east-1. Required if DomainName is set. Provided by the cert stack (cf-ui-acm.yml) output."

  HostedZoneId:
    Type: String
    Default: ""
    Description: "Route53 Hosted Zone ID. Required if DomainName is set — used for creating the Route53 alias record."

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # --------------------------------------------------
  # CloudWatch Log Group
  # Pre-created so retention is managed by CloudFormation.
  # Named /aws/lambda/{AppName}-prod to stay under the /aws/lambda/ prefix
  # (covered by the deployer's existing CloudWatchLogsForLambda permission)
  # while using the -prod suffix consistent with EC2's /apps/{AppName}-prod.
  # --------------------------------------------------
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-prod"
      RetentionInDays: 30
      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # IAM Execution Role
  # Allows Lambda to write logs to the pre-created log group.
  # Extend this role's inline policies for additional AWS access
  # (e.g. SSM Parameter Store, S3, SES, DynamoDB).
  # --------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AppName}-prod*"

  # --------------------------------------------------
  # Lambda Function
  # Deployed with an inline ZipFile placeholder on first CFN run.
  # All subsequent code updates are pushed by the CI/CD deploy job via:
  #   aws lambda update-function-code --function-name <name> --zip-file fileb://package.zip
  # CFN never touches the code after creation, so stack updates are safe.
  # --------------------------------------------------
  LambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaLogGroup
    Properties:
      FunctionName: !Sub "${AppName}-lambda"
      Runtime: !Ref Runtime
      Handler: !Ref Handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: !Ref MemorySize
      Timeout: !Ref Timeout
      Architectures:
        - x86_64
      LoggingConfig:
        LogGroup: !Sub "/aws/lambda/${AppName}-prod"
        LogFormat: Text
      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          APP_CONFIG: !Ref AppEnvJson
      Code:
        ZipFile: |
          exports.handler = async (event) => ({
            statusCode: 200,
            body: JSON.stringify({ status: 'placeholder — deploy real code via CI/CD' }),
          });
      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # Lambda Function URL
  # Always uses AWS_IAM — only CloudFront (via OAC) can invoke it.
  # --------------------------------------------------
  LambdaFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref LambdaFunction
      AuthType: AWS_IAM
      InvokeMode: !Ref InvokeMode
      Cors:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
        AllowHeaders:
          - Authorization
          - Content-Type
        MaxAge: 300

  # --------------------------------------------------
  # CloudFront Origin Access Control (OAC)
  # Signs requests from CloudFront to the Lambda Function URL using SigV4.
  # --------------------------------------------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AppName}-lambda-oac"
        Description: !Sub "OAC for ${AppName} Lambda Function URL (AWS_IAM)"
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  # --------------------------------------------------
  # Lambda Permission — CloudFront invoke
  # Grants CloudFront permission to invoke the Lambda Function URL.
  # Pinned to this specific distribution ARN for least privilege.
  # --------------------------------------------------
  LambdaFunctionUrlCloudfrontPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunctionUrl
      FunctionUrlAuthType: AWS_IAM
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # --------------------------------------------------
  # CloudFront Distribution
  # Terminates TLS and forwards all HTTP methods to the Lambda Function URL.
  # Caching is disabled — Lambda handles all request logic.
  # AllViewerExceptHostHeader origin request policy is required with OAC
  # to forward all headers except Host (which would break SigV4 signing).
  # --------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "CloudFront for ${AppName} Lambda"
        HttpVersion: http2
        PriceClass: PriceClass_100

        Origins:
          - Id: LambdaOrigin
            # Strip https:// from the Function URL to get just the domain
            DomainName: !Select
              - 2
              - !Split ["/", !GetAtt LambdaFunctionUrl.FunctionUrl]
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2

        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad          # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true

        Aliases: !If
          - HasCustomDomain
          - - !Ref DomainName
          - !Ref AWS::NoValue

        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # Route53 Alias Record (conditional — only when DomainName is set)
  # CloudFront's hosted zone ID is always Z2FDTNDATAQYW2 (AWS-managed constant).
  # --------------------------------------------------
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2   # CloudFront global hosted zone ID — always this value
        EvaluateTargetHealth: false

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  FunctionName:
    Description: "Lambda function name — used by CI/CD deploy job to push code updates"
    Value: !Ref LambdaFunction
    Export:
      Name: !Sub "${AWS::StackName}-FunctionName"

  FunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FunctionArn"

  FunctionUrl:
    Description: "Lambda Function URL (AWS_IAM auth — use CloudFront URL for public access)"
    Value: !GetAtt LambdaFunctionUrl.FunctionUrl
    Export:
      Name: !Sub "${AWS::StackName}-FunctionUrl"

  CloudFrontDistributionId:
    Description: "CloudFront distribution ID — used by CI/CD deploy job to invalidate cache after code update"
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontDistributionId"

  CloudFrontDomainName:
    Description: "CloudFront default domain name — use this as your endpoint if no custom domain is configured"
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontUrl"

  WebsiteUrl:
    Description: "Live HTTPS URL (custom domain if configured, otherwise CloudFront default)"
    Value: !If
      - HasCustomDomain
      - !Sub "https://${DomainName}"
      - !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-WebsiteUrl"

  LogGroupName:
    Description: "CloudWatch Log Group name"
    Value: !Sub "/aws/lambda/${AppName}-prod"
    Export:
      Name: !Sub "${AWS::StackName}-LogGroupName"
