# CloudFormation stack for reso-online-store-mcp (Lambda native TypeScript).
# Based on reso-infra/templates/cf-lambda.yml — customised with MCP-specific parameters.
#
# Traffic: CloudFront → OAC (SigV4) → Lambda Function URL (AWS_IAM) → Lambda
# HTTPS is terminated at CloudFront. The Function URL is not publicly accessible.
#
# ACM certificate is managed separately in infra/cert-stack.yml.
# The CI/CD workflow deploys the cert stack in us-east-1 first, then passes the
# CertificateArn output to this stack as AcmCertificateArn.
AWSTemplateFormatVersion: "2010-09-09"
Description: >
  RESO Online Store MCP — Lambda (RESPONSE_STREAM) + CloudFront stack.
  Deploys a streaming Lambda function fronted by CloudFront via a Lambda Function URL
  with AWS_IAM auth and OAC SigV4 signing.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  AppName:
    Type: String
    Description: "App identifier (lowercase, hyphens ok). Used for all resource naming."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase letters, numbers, and hyphens only."

  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - prod
    Description: "Deployment environment."

  ApiServerUrl:
    Type: String
    Description: "Base URL of the online-store-server (e.g. https://api.reso-store.com)."

  ClientDomainUrls:
    Type: String
    Default: "*"
    Description: "Comma-separated allowed client domain URLs (e.g. https://reso-store.com,https://www.reso-store.com). Use * to allow all."

  OpenAiApiKeyParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /reso-mcp/openai-api-key
    Description: "SSM Parameter Store path for the OpenAI API key. The value is resolved at deploy time."

  OpenAiModel:
    Type: String
    Default: gpt-4o
    Description: "OpenAI model to use for the agentic loop."

  MaxIterations:
    Type: Number
    Default: 20
    Description: "Maximum number of agentic loop iterations per request."

  MaxTotalTokens:
    Type: Number
    Default: 200000
    Description: "Maximum cumulative tokens (input + output) per request."

  MemorySize:
    Type: Number
    Default: 512
    MinValue: 128
    MaxValue: 10240
    Description: "Lambda memory in MB."

  Timeout:
    Type: Number
    Default: 900
    MinValue: 1
    MaxValue: 900
    Description: "Lambda timeout in seconds."

  DomainName:
    Type: String
    Default: ""
    Description: "Custom domain (e.g. mcp.reso-store.com). Leave empty to use the CloudFront default *.cloudfront.net domain."

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: "ARN of the ACM certificate in us-east-1. Required if DomainName is set. Provided by the cert stack (infra/cert-stack.yml) output."

  HostedZoneId:
    Type: String
    Default: ""
    Description: "Route53 Hosted Zone ID. Required if DomainName is set."

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # --------------------------------------------------
  # CloudWatch Log Group
  # Pre-created so retention is managed by CloudFormation.
  # Named /aws/lambda/{AppName}-prod — consistent with the kit convention.
  # --------------------------------------------------
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-prod"
      RetentionInDays: 30
      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # IAM Execution Role
  # Allows Lambda to write logs to the pre-created log group.
  # SSM read access is not needed — the OpenAI key is resolved at CFN deploy time
  # via AWS::SSM::Parameter::Value<String> and injected directly as an env var.
  # --------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AppName}-prod*"

  # --------------------------------------------------
  # Lambda Function
  # Deployed with an inline ZipFile placeholder on first CFN run.
  # All subsequent code updates are pushed by the CI/CD deploy job via:
  #   aws lambda update-function-code --function-name <name> --zip-file fileb://package.zip
  # CFN never touches the code after creation, so stack updates are safe.
  # --------------------------------------------------
  LambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaLogGroup
    Properties:
      FunctionName: !Sub "${AppName}-lambda"
      Runtime: nodejs20.x
      Handler: dist/index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: !Ref MemorySize
      Timeout: !Ref Timeout
      Architectures:
        - x86_64
      LoggingConfig:
        LogGroup: !Sub "/aws/lambda/${AppName}-prod"
        LogFormat: Text
      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          API_SERVER_URL: !Ref ApiServerUrl
          CLIENT_DOMAIN_URLS: !Ref ClientDomainUrls
          OPENAI_API_KEY: !Ref OpenAiApiKeyParam
          OPENAI_MODEL: !Ref OpenAiModel
          MAX_ITERATIONS: !Sub "${MaxIterations}"
          MAX_TOTAL_TOKENS: !Sub "${MaxTotalTokens}"
      Code:
        ZipFile: |
          exports.handler = async (event) => ({
            statusCode: 200,
            body: JSON.stringify({ status: 'placeholder — deploy real code via CI/CD' }),
          });
      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # Lambda Function URL
  # AWS_IAM auth — not publicly accessible without CloudFront + OAC.
  # RESPONSE_STREAM: supports streaming responses (agentic AI, SSE).
  # --------------------------------------------------
  LambdaFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref LambdaFunction
      AuthType: AWS_IAM
      InvokeMode: RESPONSE_STREAM
      Cors:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type
          - client-country-code
        MaxAge: 300

  # --------------------------------------------------
  # CloudFront Origin Access Control (OAC)
  # Signs requests from CloudFront to the Lambda Function URL using SigV4.
  # Required because the Function URL uses AWS_IAM auth.
  # --------------------------------------------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AppName}-lambda-oac"
        Description: !Sub "OAC for ${AppName} Lambda Function URL (AWS_IAM)"
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  # --------------------------------------------------
  # Lambda Permission — CloudFront invoke
  # Grants CloudFront permission to invoke the Lambda Function URL.
  # --------------------------------------------------
  LambdaFunctionUrlCloudfrontPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # --------------------------------------------------
  # CloudFront Distribution
  # Terminates TLS and forwards all HTTP methods to the Lambda Function URL.
  # Caching is disabled — Lambda handles all request logic.
  # AllViewerExceptHostHeader origin request policy forwards all headers except Host.
  # --------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "CloudFront for ${AppName} Lambda"
        HttpVersion: http2
        PriceClass: PriceClass_100

        Origins:
          - Id: LambdaOrigin
            DomainName: !Select
              - 2
              - !Split ["/", !GetAtt LambdaFunctionUrl.FunctionUrl]
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2

        DefaultCacheBehavior:
          TargetOriginId: LambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad          # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true

        Aliases: !If
          - HasCustomDomain
          - - !Ref DomainName
          - !Ref AWS::NoValue

        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

      Tags:
        - Key: app
          Value: !Ref AppName

  # --------------------------------------------------
  # Route53 Alias Record (conditional — only when DomainName is set)
  # --------------------------------------------------
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2   # CloudFront global hosted zone ID — always this value
        EvaluateTargetHealth: false

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  FunctionName:
    Description: "Lambda function name — used by CI/CD deploy job to push code updates"
    Value: !Ref LambdaFunction
    Export:
      Name: !Sub "${AWS::StackName}-FunctionName"

  FunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FunctionArn"

  FunctionUrl:
    Description: "Lambda Function URL (AWS_IAM auth — not publicly accessible without CloudFront)"
    Value: !GetAtt LambdaFunctionUrl.FunctionUrl
    Export:
      Name: !Sub "${AWS::StackName}-FunctionUrl"

  CloudFrontDistributionId:
    Description: "CloudFront distribution ID — used by CI/CD deploy job to invalidate cache after code update"
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontDistributionId"

  CloudFrontUrl:
    Description: "CloudFront default HTTPS URL"
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontUrl"

  WebsiteUrl:
    Description: "Live HTTPS URL (custom domain if configured, otherwise CloudFront default)"
    Value: !If
      - HasCustomDomain
      - !Sub "https://${DomainName}"
      - !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-WebsiteUrl"

  LogGroupName:
    Description: "CloudWatch Log Group name"
    Value: !Sub "/aws/lambda/${AppName}-prod"
    Export:
      Name: !Sub "${AWS::StackName}-LogGroupName"
